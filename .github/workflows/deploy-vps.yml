# Deploy automático al VPS (Hostinger) sin Docker Hub:
# SSH → git pull → docker compose up -d --build

name: Deploy VPS

on:
  push:
    branches: [main-copia]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH al VPS y desplegar SkinAtlas
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.VPS_SSH_KEY_PASSPHRASE }}
          port: 22
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            BRANCH="${{ github.ref_name }}"
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            docker compose up -d --build
            docker compose ps
